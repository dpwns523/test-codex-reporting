Prefer files in this repository first, especially user-provided material under folders such as `input/`, `cases/`, `evidence/`, `references/`, and `output/` when present.
Use current external sources only when the request needs up-to-date facts or local material is insufficient.
Cite exact file paths and exact section names for every substantive section.
Separate fact, inference, and assumption clearly.
"""
